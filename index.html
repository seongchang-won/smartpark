<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#090e1a">
<title>태화강국가정원 3D · 스마트공원 IoT 통합관제</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
<link href="https://cdn.jsdelivr.net/npm/cesium@1.112.0/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/cesium@1.112.0/Build/Cesium/Cesium.js"></script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-icon">🌿</div>
    <div>
      <div class="header-title">태화강국가정원 <span>IoT 통합관제</span></div>
      <div class="header-sub">스마트공원 시설물 관리 시스템 v1.0 · 3D</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge">
      <div class="live-dot"></div>
      실시간 모니터링
    </div>
    <div class="clock mono" id="clock"></div>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="테마 전환">🌙</button>
  </div>
</div>

<div class="main">
  <div class="map-container">
    <div id="map"></div>
    <div id="cesiumContainer"></div>
    <div class="map-controls" id="filterBar"></div>
    <div class="add-menu hidden" id="addMenu"></div>
    <div class="add-indicator hidden" id="addIndicator"></div>
    <div class="stats-overlay" id="statsOverlay"></div>
    <div class="map-3d-bar" id="map3dBar">
      <div class="bar-title">위성 영상</div>
      <button id="lyr-vworld"  class="active" onclick="setBaseLayer('vworld')">🇰🇷 VWorld 위성</button>
      <button id="lyr-vworld2" onclick="setBaseLayer('vworldBase')">🗺️ VWorld 일반</button>
      <button id="lyr-google"  onclick="setBaseLayer('google')">🛰️ 구글 위성</button>
      <div class="bar-title">오버레이</div>
      <button id="lyr-hybrid" onclick="toggleHybrid()">🏷️ 라벨 오버레이</button>
      <button id="lyr-holo" class="active" onclick="toggleHolo()">🌌 홀로그램</button>
      <div class="bar-title">카메라</div>
      <button onclick="flyOverview()">📍 전체 보기</button>
      <button onclick="flyTop()">⬇️ 탑뷰</button>
      <button onclick="flyTilted()">🎬 사선 45°</button>
    </div>
  </div>

  <div class="sidebar">
    <div id="detailPanel">
      <div class="select-prompt">
        <div class="icon">📍</div>
        <p>지도에서 시설물을 선택하면<br>상세 정보를 확인할 수 있습니다</p>
      </div>
    </div>
    <div class="alert-section">
      <div class="alert-section-header">
        <span>🚨 경고 알림 <span class="alert-count" id="alertCount">0</span></span>
      </div>
      <div class="alert-list" id="alertList"></div>
    </div>
    <div class="overall-gauge" id="overallGauge"></div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/cesium-adapter.js"></script>
</body>
</html>
